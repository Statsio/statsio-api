name: Tests API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite, sqlite3, mbstring, xml, curl, zip, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: |
          cp .env.example .env 2>/dev/null || echo "APP_KEY=" > .env
          php artisan key:generate --force

      - name: Run tests
        run: php artisan test --stop-on-failure
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          QUEUE_CONNECTION: sync
          CACHE_STORE: array
          SESSION_DRIVER: array
