name: Security

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secrets:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    # Rollout progressif : on laisse tourner sans bloquer le temps de trier les
    # faux positifs, puis on retire ce flag (voir plan de sécurité).
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        run: gitleaks detect --source . --verbose

  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/php \
            --config p/owasp-top-ten \
            --config p/secrets \
            --severity ERROR \
            --error \
            --sarif --output semgrep.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: Composer audit (SCA)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Composer audit
        run: composer audit --format=table --locked

  docker-scan:
    name: Trivy (Dockerfile + image)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy config scan (Dockerfile misconfig)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ./Dockerfile
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Build image for scanning
        run: docker build -t statsio-api:ci-scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: statsio-api:ci-scan
          format: sarif
          output: trivy-image.sarif
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
