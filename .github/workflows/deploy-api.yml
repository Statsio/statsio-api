name: Deploy API

on:
  push:
    branches: [main]

jobs:
  test:
    uses: ./.github/workflows/tests.yml

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Copy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/statsio/api"
          rm: false

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          TRAEFIK_DASHBOARD_AUTH: ${{ secrets.TRAEFIK_DASHBOARD_AUTH }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          APP_URL: ${{ vars.APP_URL }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          SANCTUM_STATEFUL_DOMAINS: ${{ vars.SANCTUM_STATEFUL_DOMAINS }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_DATASETS_BUCKET: ${{ vars.R2_DATASETS_BUCKET }}
          R2_MEDIA_BUCKET: ${{ vars.R2_MEDIA_BUCKET }}
          DATASETS_DISK: ${{ vars.DATASETS_DISK }}
          ZO_ROOT_USER_EMAIL: ${{ secrets.ZO_ROOT_USER_EMAIL }}
          ZO_ROOT_USER_PASSWORD: ${{ secrets.ZO_ROOT_USER_PASSWORD }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MEDICAMENTS_API_BASE_URL: ${{ vars.MEDICAMENTS_API_BASE_URL }}
          WHO_GHO_API_BASE_URL: ${{ vars.WHO_GHO_API_BASE_URL }}
          ICD11_API_BASE_URL: ${{ vars.ICD11_API_BASE_URL }}
          ICD11_TOKEN_URL: ${{ vars.ICD11_TOKEN_URL }}
          ICD11_CLIENT_ID: ${{ secrets.ICD11_CLIENT_ID }}
          ICD11_CLIENT_SECRET: ${{ secrets.ICD11_CLIENT_SECRET }}
          ICD11_RELEASE_ID: ${{ vars.ICD11_RELEASE_ID }}
          UMLS_API_BASE_URL: ${{ vars.UMLS_API_BASE_URL }}
          UMLS_API_KEY: ${{ secrets.UMLS_API_KEY }}
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_KEY,DB_PASSWORD,REDIS_PASSWORD,TRAEFIK_DASHBOARD_AUTH,GOOGLE_CLIENT_ID,ADMIN_PASSWORD,APP_URL,CORS_ALLOWED_ORIGINS,SANCTUM_STATEFUL_DOMAINS,R2_ENDPOINT,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_DATASETS_BUCKET,R2_MEDIA_BUCKET,DATASETS_DISK,ZO_ROOT_USER_EMAIL,ZO_ROOT_USER_PASSWORD,MAIL_USERNAME,MAIL_PASSWORD,MEDICAMENTS_API_BASE_URL,WHO_GHO_API_BASE_URL,ICD11_API_BASE_URL,ICD11_TOKEN_URL,ICD11_CLIENT_ID,ICD11_CLIENT_SECRET,ICD11_RELEASE_ID,UMLS_API_BASE_URL,UMLS_API_KEY
          script: |
            set -e

            cd /opt/statsio/api

            cat > .env.prod << ENVEOF
            APP_NAME=Statsio
            APP_ENV=production
            APP_KEY=${APP_KEY}
            APP_DEBUG=false
            APP_URL=${APP_URL}
            APP_LOCALE=fr
            APP_FALLBACK_LOCALE=en

            LOG_CHANNEL=stderr
            LOG_LEVEL=info

            DB_CONNECTION=pgsql
            DB_HOST=db
            DB_PORT=5432
            DB_DATABASE=statsio
            DB_USERNAME=statsio
            DB_PASSWORD=${DB_PASSWORD}

            POSTGRES_DB=statsio
            POSTGRES_USER=statsio
            POSTGRES_PASSWORD=${DB_PASSWORD}

            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            CACHE_STORE=database
            QUEUE_CONNECTION=database

            CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS}
            SANCTUM_EXPIRATION=1440
            AUTH_REFRESH_TOKEN_TTL_DAYS=30

            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}

            ADMIN_PASSWORD=${ADMIN_PASSWORD}

            STATS_DATA_MAX_SNAPSHOT_ROWS=500000

            R2_ENDPOINT=${R2_ENDPOINT}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_DATASETS_BUCKET=${R2_DATASETS_BUCKET}
            R2_MEDIA_BUCKET=${R2_MEDIA_BUCKET}
            DATASETS_DISK=${DATASETS_DISK}

            ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}
            ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}
            MAIL_MAILER=smtp
            MAIL_SCHEME=null
            MAIL_HOST=smtp-relay.brevo.com
            MAIL_PORT=587
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_PASSWORD=${MAIL_PASSWORD}
            MAIL_FROM_ADDRESS=noreply@statsio.fr
            MAIL_FROM_NAME=Statsio
            ENVEOF

            # Services externes — écrits seulement si définis (sinon fallback sur config/*.php)
            [ -n "${MEDICAMENTS_API_BASE_URL}" ] && echo "MEDICAMENTS_API_BASE_URL=${MEDICAMENTS_API_BASE_URL}" >> .env.prod
            [ -n "${WHO_GHO_API_BASE_URL}" ] && echo "WHO_GHO_API_BASE_URL=${WHO_GHO_API_BASE_URL}" >> .env.prod
            [ -n "${ICD11_API_BASE_URL}" ] && echo "ICD11_API_BASE_URL=${ICD11_API_BASE_URL}" >> .env.prod
            [ -n "${ICD11_TOKEN_URL}" ] && echo "ICD11_TOKEN_URL=${ICD11_TOKEN_URL}" >> .env.prod
            [ -n "${ICD11_CLIENT_ID}" ] && echo "ICD11_CLIENT_ID=${ICD11_CLIENT_ID}" >> .env.prod
            [ -n "${ICD11_CLIENT_SECRET}" ] && echo "ICD11_CLIENT_SECRET=${ICD11_CLIENT_SECRET}" >> .env.prod
            [ -n "${ICD11_RELEASE_ID}" ] && echo "ICD11_RELEASE_ID=${ICD11_RELEASE_ID}" >> .env.prod
            [ -n "${UMLS_API_BASE_URL}" ] && echo "UMLS_API_BASE_URL=${UMLS_API_BASE_URL}" >> .env.prod
            [ -n "${UMLS_API_KEY}" ] && echo "UMLS_API_KEY=${UMLS_API_KEY}" >> .env.prod

            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

            # Redémarre nginx pour forcer la résolution DNS du nouveau container API
            docker compose -f docker-compose.prod.yml restart nginx

            echo "Deploy OK"
