$kind: http-request
url: "{{base_url}}/api/channels"
method: POST
headers:
  Accept-Language: "{{language}}"
  Authorization: "{{token_type}} {{token}}"
body:
  type: formdata
  content:
    - type: text
      key: name
      value: My Awesome Channel
    - type: text
      key: description
      value: This is a great channel about technology
    - type: text
      key: categories[]
      value: gaming
    - type: file
      key: logo
      src: []
    - type: file
      key: banner
      src: []
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();

      if (res.success && res.data?.id) {
          pm.environment.set("channel_id", res.data.id);
      }
    language: text/javascript
order: 2000
