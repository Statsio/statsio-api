$kind: http-request
url: "{{base_url}}/api/statsdata"
method: POST
headers:
  Accept-Language: "{{language}}"
  Authorization: "{{token_type}} {{token}}"
  Content-Type: application/json
body:
  type: json
  content: |
    {
      "title": "Mon rapport",
      "subtitle": "",
      "visibility": "private"
    }
scripts:
  - type: afterResponse
    code: |-
      const res = pm.response.json();
      if (res.success && res.data?.id) {
          pm.environment.set("statsdata_document_id", res.data.id);
      }
    language: text/javascript
order: 3000
