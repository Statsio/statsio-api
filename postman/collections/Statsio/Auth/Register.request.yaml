$kind: http-request
url: "{{base_url}}/api/auth/register"
method: POST
headers:
  Accept-Language: "{{language}}"
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "first_name": "Corentin",
      "last_name": "GESSE",
      "birthday": "2003-05-20",
      "email": "{{email}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    code: >-
      const res = pm.response.json();


      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });


      pm.test("Register success is true", function () {
          pm.expect(res.success).to.eql(true);
      });


      if (res.success && res.data) {
          pm.environment.set("token", res.data.access_token || res.data.token || "");
          pm.environment.set("token_type", res.data.type || "Bearer");
          pm.environment.set("refresh_token", res.data.refresh_token || "");
          pm.environment.set("user_id", res.data.user?.id || "");
      }
    language: text/javascript
order: 2000
