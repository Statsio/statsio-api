services:
  db:
    image: postgres:18-alpine
    container_name: statsio-db-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-statsio}
      POSTGRES_USER: ${DB_USERNAME:-statsio}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_staging:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-statsio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8-alpine
    container_name: statsio-redis-staging
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data_staging:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: statsio-api-staging
    restart: unless-stopped
    env_file: .env.staging
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: statsio-queue-staging
    restart: unless-stopped
    env_file: .env.staging
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--queue=ingestion", "--sleep=3", "--tries=3", "--timeout=300"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: statsio-nginx-staging
    restart: unless-stopped
    networks:
      - default
      - edge
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/nginx.fastcgi.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    labels:
      traefik.enable: "true"
      traefik.docker.network: "edge"
      traefik.http.routers.statsio-api-staging.rule: "Host(`api-staging.statsio.fr`)"
      traefik.http.routers.statsio-api-staging.entrypoints: "websecure"
      traefik.http.routers.statsio-api-staging.tls: "true"
      traefik.http.services.statsio-api-staging.loadbalancer.server.port: "80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
  edge:
    external: true

volumes:
  postgres_data_staging:
  redis_data_staging:
