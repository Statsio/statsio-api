services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: statsio-api-app
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - db
      - mailhog
    # PHP-FPM n’a pas de healthcheck, c’est Nginx qui gère l’accès HTTP

  nginx:
    image: nginx:alpine
    container_name: statsio-api-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:17-alpine
    container_name: statsio-api-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: statsio-api-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.2:8025 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  cloudbeaver:
    image: dbeaver/cloudbeaver:25.0.2
    container_name: statsio-api-cloudbeaver
    ports:
      - "8081:8978"
    depends_on:
      - db

volumes:
  dbdata:
