services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: statsio-api-app
    volumes:
      - .:/var/www
    working_dir: /var/www
    depends_on:
      - db
      - mailhog
    healthcheck:
      test: ["CMD-SHELL", "php artisan health:check"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: statsio-api-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: statsio-api-db
    env_file:
      .env
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: statsio-api-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dbdata:
