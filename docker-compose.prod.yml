services:
  db:
    image: postgres:16-alpine
    container_name: statsio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-statsio}
      POSTGRES_USER: ${DB_USERNAME:-statsio}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-statsio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: statsio-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: statsio-api
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: statsio-queue
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--queue=ingestion", "--sleep=3", "--tries=3", "--timeout=300"]

  nginx:
    image: nginx:alpine
    container_name: statsio-nginx
    restart: unless-stopped
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/nginx.fastcgi.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    labels:
      traefik.enable: "true"
      traefik.http.routers.statsio-api.rule: "Host(`api.statsio.fr`)"
      traefik.http.routers.statsio-api.entrypoints: "websecure"
      traefik.http.routers.statsio-api.tls: "true"
      traefik.http.services.statsio-api.loadbalancer.server.port: "80"

  traefik:
    image: traefik:v3.2
    container_name: statsio-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - ./docker/traefik/certs:/certs:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik-dashboard.rule: "Host(`traefik.statsio.fr`)"
      traefik.http.routers.traefik-dashboard.entrypoints: "websecure"
      traefik.http.routers.traefik-dashboard.tls: "true"
      traefik.http.routers.traefik-dashboard.service: "api@internal"
      traefik.http.routers.traefik-dashboard.middlewares: "traefik-dashboard-auth"
      traefik.http.middlewares.traefik-dashboard-auth.basicauth.users: "${TRAEFIK_DASHBOARD_AUTH}"

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: statsio-openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
      ZO_DATA_DIR: /data
    volumes:
      - openobserve_data:/data
    labels:
      traefik.enable: "true"
      traefik.http.routers.statsio-observe.rule: "Host(`observe.statsio.fr`)"
      traefik.http.routers.statsio-observe.entrypoints: "websecure"
      traefik.http.routers.statsio-observe.tls: "true"
      traefik.http.services.statsio-observe.loadbalancer.server.port: "5080"

  vector:
    image: timberio/vector:latest-alpine
    container_name: statsio-vector
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD}
    volumes:
      - ./docker/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - openobserve

volumes:
  postgres_data:
  redis_data:
  openobserve_data:
