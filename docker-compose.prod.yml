services:
  db:
    image: postgres:16-alpine
    container_name: statsio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-statsio}
      POSTGRES_USER: ${DB_USERNAME:-statsio}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-statsio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: statsio-api
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: statsio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  postgres_data:
