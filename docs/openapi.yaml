openapi: 3.0.3
info:
  title: Statsio API
  version: 1.0.0
  description: API documentation for the Statsio backend.
servers:
  - url: http://localhost:8080
    description: Local Docker environment
tags:
  - name: Healthcheck
  - name: Auth
  - name: User
  - name: Channels
  - name: StatsData
  - name: Source API
paths:
  /api/healthcheck:
    get:
      tags: [Healthcheck]
      summary: Get API health status
      responses:
        '200':
          description: Healthcheck response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthcheckResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, birthday, email, password]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                birthday:
                  type: string
                  format: date
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/auth/google:
    post:
      tags: [Auth]
      summary: Authenticate with Google ID token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token and issue new tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/me:
    get:
      tags: [User]
      summary: Get authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/account/anonymize:
    post:
      tags: [User]
      summary: Anonymize authenticated account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account anonymized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/channels:
    get:
      tags: [Channels]
      summary: List channels
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Paginated channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    additionalProperties: true
    post:
      tags: [Channels]
      summary: Create a channel
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                categories:
                  type: array
                  items:
                    type: string
                logo:
                  type: string
                  format: binary
                banner:
                  type: string
                  format: binary
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/channels/{id}:
    get:
      tags: [Channels]
      summary: Get a channel by id
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Channels]
      summary: Update a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel_profile_id:
                  type: integer
                categories:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [active, suspended, banned, anonymized]
                suspended_until:
                  type: string
                  format: date-time
                anonymized_at:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Channels]
      summary: Delete a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'

  /api/channels/{id}/suspend:
    post:
      tags: [Channels]
      summary: Suspend a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                suspended_until:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Channel suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/channels/{id}/ban:
    post:
      tags: [Channels]
      summary: Ban a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/channels/{id}/activate:
    post:
      tags: [Channels]
      summary: Activate a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/channels/{id}/anonymize:
    post:
      tags: [Channels]
      summary: Anonymize a channel
      parameters:
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel anonymized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/statsdata:
    post:
      tags: [StatsData]
      summary: Create a StatsData document (métadonnées + blocs optionnels ; les sources sont sur /sources)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatsDataDocumentWrite'
      responses:
        '201':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataDocumentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/source-api/probe-connection:
    post:
      tags: [Source API]
      summary: Tester une URL d’API pour une future source (avec ou sans clé Bearer)
      description: |
        Réservé au flux **sources de type API** (pas à la ressource document StatsData).
        GET sur l’URL avec optionnellement `Authorization: Bearer {apiKey}`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                apiKey:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Résultat du test (ok peut être false si HTTP non 2xx ou erreur réseau)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataApiProbeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/statsdata/{id}:
    get:
      tags: [StatsData]
      summary: Get a StatsData document (blocs + dataSources) pour édition
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentId'
      responses:
        '200':
          description: Document trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/StatsDataDocumentPayload'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [StatsData]
      summary: Update a StatsData document (champs partiels ou document complet)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatsDataDocumentPatch'
      responses:
        '200':
          description: Document updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataDocumentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [StatsData]
      summary: Delete a StatsData document
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentId'
      responses:
        '204':
          description: Deleted (no body)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/statsdata/{documentId}/sources:
    get:
      tags: [StatsData]
      summary: List data sources for a document
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentIdPath'
      responses:
        '200':
          description: Sources list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataSourcesListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [StatsData]
      summary: Create a data source (JSON pour manual/api, multipart pour file)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatsDataSourceCreateJson'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StatsDataSourceCreateMultipart'
      responses:
        '201':
          description: Source created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataSourceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/statsdata/{documentId}/sources/probe:
    post:
      tags: [StatsData]
      summary: Probe an API URL (format JSON/XML/…, racine suggérée) sans enregistrer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                apiKey:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Probe result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataApiProbeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/statsdata/{documentId}/sources/{sourceId}:
    get:
      tags: [StatsData]
      summary: Get a data source by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentIdPath'
        - $ref: '#/components/parameters/StatsDataSourceId'
      responses:
        '200':
          description: Source found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataSourceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [StatsData]
      summary: Update a data source
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentIdPath'
        - $ref: '#/components/parameters/StatsDataSourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatsDataSourcePatch'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StatsDataSourcePatchMultipart'
      responses:
        '200':
          description: Source updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsDataSourceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [StatsData]
      summary: Delete a data source
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsDataDocumentIdPath'
        - $ref: '#/components/parameters/StatsDataSourceId'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    ChannelId:
      in: path
      name: id
      required: true
      schema:
        type: integer
    StatsDataDocumentId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    StatsDataDocumentIdPath:
      in: path
      name: documentId
      required: true
      schema:
        type: string
        format: uuid
    StatsDataSourceId:
      in: path
      name: sourceId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthcheckResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        checks:
          type: object
          properties:
            api:
              type: boolean
            database:
              type: boolean
    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthPayload'
    AuthPayload:
      type: object
      properties:
        token:
          type: string
          description: Legacy alias of access_token
        access_token:
          type: string
        refresh_token:
          type: string
        type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        user:
          $ref: '#/components/schemas/UserSummary'
    UserMeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
        google_id:
          type: string
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        suspended_until:
          type: string
          format: date-time
          nullable: true
        anonymized_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        profile:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        user_id:
          type: integer
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        birthday:
          type: string
          format: date
          nullable: true
        birth_year:
          type: integer
          nullable: true
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        zip_code:
          type: string
          nullable: true
    ChannelResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true
    StatsDataDocumentWrite:
      type: object
      required: [title, visibility]
      properties:
        title:
          type: string
          maxLength: 500
        subtitle:
          type: string
          maxLength: 5000
        visibility:
          type: string
          enum: [private, team, public]
        blocks:
          type: array
          items:
            type: object
            additionalProperties: true
    StatsDataDocumentPatch:
      type: object
      properties:
        title:
          type: string
        subtitle:
          type: string
        visibility:
          type: string
          enum: [private, team, public]
        blocks:
          type: array
          items:
            type: object
            additionalProperties: true
    StatsDataDocumentPayload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        subtitle:
          type: string
        visibility:
          type: string
          enum: [private, team, public]
        blocks:
          type: array
          items:
            type: object
            additionalProperties: true
        dataSources:
          type: array
          description: Sources liées (GET /sources ou inclus après create/update document)
          items:
            type: object
            additionalProperties: true
        slug:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StatsDataSourcesListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
            additionalProperties: true
    StatsDataSourceCreateJson:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [manual, api]
        name:
          type: string
        manualData:
          type: object
          additionalProperties: true
        apiUrl:
          type: string
          format: uri
        apiKey:
          type: string
          nullable: true
        verify:
          type: boolean
          description: Si true (api), exécute une sonde et enregistre format / racine / statut
        responseRoot:
          type: string
          nullable: true
          description: Après sonde, force la clé racine JSON (ex. data) si la suggestion auto ne convient pas
    StatsDataSourceCreateMultipart:
      type: object
      required: [type, file]
      properties:
        type:
          type: string
          enum: [file]
        name:
          type: string
        file:
          type: string
          format: binary
    StatsDataSourcePatch:
      type: object
      properties:
        name:
          type: string
        sortOrder:
          type: integer
        manualData:
          type: object
          additionalProperties: true
        apiUrl:
          type: string
          format: uri
        apiKey:
          type: string
          nullable: true
        verify:
          type: boolean
    StatsDataSourcePatchMultipart:
      allOf:
        - $ref: '#/components/schemas/StatsDataSourcePatch'
        - type: object
          properties:
            file:
              type: string
              format: binary
    StatsDataSourceEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          additionalProperties: true
    StatsDataApiProbeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            ok:
              type: boolean
            statusCode:
              type: integer
              nullable: true
            detectedContentType:
              type: string
              nullable: true
            responseFormat:
              type: string
              enum: [json, xml, csv, text, unknown]
            suggestedResponseRoot:
              type: string
              nullable: true
              description: Ex. "data" si le JSON a une clé data
            bodyPreview:
              type: string
              nullable: true
            error:
              type: string
              nullable: true
    StatsDataDocumentEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/StatsDataDocumentPayload'
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          nullable: true
        message:
          type: string
        error:
          type: string
          nullable: true
        data:
          nullable: true
    ValidationErrorResponse:
